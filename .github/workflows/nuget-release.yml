name: Nuget Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9
      - name: Check .NET version
        run: dotnet --version
      - name: Check .NET SDKs
        run: dotnet --list-sdks
      - name: Check .NET runtimes
        run: dotnet --list-runtimes

      - name: Verify public API is shipped
        run: |
          # A release must not carry unshipped public API: every
          # PublicAPI.Unshipped.txt should be empty apart from '#' lines
          # (e.g. '#nullable enable') and blank lines. Otherwise the
          # shipped/unshipped state was not promoted before release.
          status=0
          while IFS= read -r -d '' f; do
            leftover=$(grep -vE '^[[:space:]]*(#.*)?$' "$f" || true)
            if [ -n "$leftover" ]; then
              echo "::error file=$f::Unshipped public API present; promote to PublicAPI.Shipped.txt before releasing"
              echo "--- $f ---"
              printf '%s\n' "$leftover"
              status=1
            fi
          done < <(find . -name PublicAPI.Unshipped.txt -print0)
          exit $status

      - name: get version from tag
        id: get_version
        run: |
          realversion="${GITHUB_REF/refs\/tags\//}"
          realversion="${realversion//v/}"
          echo "VERSION=$realversion" >> $GITHUB_OUTPUT

      - name: Update version in csproj
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          echo "Setting version to $VERSION"

          # Update the version in the NRedisStack.csproj file
          sed -i "s|<Version>.*</Version>|<Version>$VERSION</Version>|" ./src/NRedisStack/NRedisStack.csproj
          sed -i "s|<ReleaseVersion>.*</ReleaseVersion>|<ReleaseVersion>$VERSION</ReleaseVersion>|" ./src/NRedisStack/NRedisStack.csproj
          sed -i "s|<PackageVersion>.*</PackageVersion>|<PackageVersion>$VERSION</PackageVersion>|" ./src/NRedisStack/NRedisStack.csproj        
          cat ./src/NRedisStack/NRedisStack.csproj    

      - name: Build
        run: dotnet pack -c Release --output .
      - name: Publish
        uses: alirezanet/publish-nuget@v3.0.3
        with:
          NUGET_KEY: ${{secrets.NUGET_API_KEY}}
          PROJECT_FILE_PATH: src/NRedisStack/NRedisStack.csproj
          PACKAGE_NAME: NRedisStack
          TAG_COMMIT: false
