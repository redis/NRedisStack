---

services:

  redis:
    image: ${CLIENT_LIBS_TEST_IMAGE:-redislabs/client-libs-test:7.4.1}
    container_name: redis-standalone
    environment:
      - TLS_ENABLED=yes
      - REDIS_CLUSTER=no
      - PORT=6379
      - TLS_PORT=6666
    command: ${REDIS_EXTRA_ARGS:---enable-debug-command yes --enable-module-command yes --tls-auth-clients optional --save ""}
    ports:
      - 6379:6379
      - 6666:6666 # TLS port
    volumes:
      - "./standalone:/redis/work"
    profiles:
      - standalone
      - all-stack
      - all

  cluster:
    image: ${CLIENT_LIBS_TEST_IMAGE:-redislabs/client-libs-test:7.4.1}
    container_name: redis-cluster
    environment:
      - REDIS_CLUSTER=yes
      - NODES=6
      - REPLICAS=1
      - TLS_ENABLED=yes
      - PORT=16379
      - TLS_PORT=27379
    command: ${REDIS_EXTRA_ARGS:---enable-debug-command yes --enable-module-command yes --tls-auth-clients optional --save ""}
    ports:
      - "16379-16384:16379-16384"
      - "27379-27384:27379-27384"
    volumes:
      - "./cluster:/redis/work"
    profiles:
      - cluster
      - all-stack
      - all  

  redis-stack:
    image: ${REDIS_STACK_IMAGE:-redis/redis-stack-server:edge}
    container_name: redis-stack
    ports:
      - 6479:6379
    environment:
      - "REDIS_ARGS=${REDIS_STACK_EXTRA_ARGS:---enable-debug-command yes --enable-module-command yes --save ''}"
    profiles:
      - standalone
      - all-stack

  redis-stack-graph:
    image: redis/redis-stack-server:6.2.6-v15
    container_name: redis-stack-graph
    ports:
      - 6480:6379
    profiles:
      - graph