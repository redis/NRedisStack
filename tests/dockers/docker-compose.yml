---

services:

  redis:
    image: ${CLIENT_LIBS_TEST_IMAGE:-redislabs/client-libs-test:8.10-rc2}
    container_name: redis-standalone
    environment:
      - TLS_ENABLED=yes
      - REDIS_CLUSTER=no
      - PORT=6379
      - TLS_PORT=6666
    command: ${REDIS_EXTRA_ARGS:---enable-debug-command yes --enable-module-command yes --tls-auth-clients optional --save ""}
    ports:
      - 6379:6379
      - 6666:6666 # TLS port
    volumes:
      - "./standalone:/redis/work"
    healthcheck:
      # gate `up --wait` on the server actually accepting commands
      test: ["CMD-SHELL", "redis-cli -p 6379 PING | grep -q PONG"]
      interval: 1s
      timeout: 5s
      retries: 30
      start_period: 1s
    profiles:
      - standalone
      - all

  cluster:
    image: ${CLIENT_LIBS_TEST_IMAGE:-redislabs/client-libs-test:8.10-rc2}
    container_name: redis-cluster
    environment:
      - REDIS_CLUSTER=yes
      - NODES=6
      - REPLICAS=1
      - TLS_ENABLED=yes
      - PORT=16379
      - TLS_PORT=27379
    command: ${REDIS_EXTRA_ARGS:---enable-debug-command yes --enable-module-command yes --tls-cluster yes --tls-auth-clients optional --save "" --cluster-announce-ip 127.0.0.1}
    ports:
      - "16379-16384:16379-16384"
      - "27379-27384:27379-27384"
    volumes:
      - "./cluster:/redis/work"
    healthcheck:
      # gate `up --wait` on the cluster being fully formed (all 16384 slots
      # assigned). Without this the container reports "running" while
      # redis-cli --cluster create is still assigning slots, so tests connect
      # to a half-formed cluster and cache a stale slot map -> spurious -MOVED.
      test: ["CMD-SHELL", "redis-cli -p 16379 CLUSTER INFO | grep -q cluster_state:ok"]
      interval: 1s
      timeout: 5s
      retries: 60
      start_period: 2s
    profiles:
      - cluster
      - all
